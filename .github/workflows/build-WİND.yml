name: Sky-Core-OS Build CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm xorriso grub-pc-bin os-prober

    - name: Compile Assembly (boot.asm)
      run: |
        nasm -f elf32 boot.asm -o boot.o

    - name: Compile Kernel (kernel.c)
      run: |
        gcc -m32 -ffreestanding -fno-builtin -fno-stack-protector -O2 -Wall -c kernel.c -o kernel.o

    - name: Link Kernel Binaries
      run: |
        ld -m elf_i386 -T linker.ld boot.o kernel.o -o kernel.bin

    - name: Prepare ISO Structure and GRUB Config
      run: |
        mkdir -p iso/boot/grub
        cp kernel.bin iso/boot/kernel.bin
        
        echo 'set default=0' > iso/boot/grub/grub.cfg
        echo 'set timeout=0' >> iso/boot/grub/grub.cfg
        echo 'menuentry "Sky-Core-OS Core 1" {' >> iso/boot/grub/grub.cfg
        echo '	multiboot /boot/kernel.bin' >> iso/boot/grub/grub.cfg
        echo '	boot' >> iso/boot/grub/grub.cfg
        echo '}' >> iso/boot/grub/grub.cfg

    - name: Build Sky-Core-OS ISO
      run: |
        grub-mkrescue -o sky_os.iso iso

    - name: Verify ISO Creation
      run: |
        if [ -f sky_os.iso ]; then
          echo "SUCCESS: sky_os.iso created successfully!"
        else
          echo "ERROR: sky_os.iso not found!"
          exit 1
        fi

    - name: Upload Build Artifact (ISO)
      uses: actions/upload-artifact@v4
      with:
        name: Sky-Core-OS-ISO
        path: sky_os.iso
