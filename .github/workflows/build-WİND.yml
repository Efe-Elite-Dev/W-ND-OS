name: Build Wind OS ISO

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # İstediğinde GitHub paneli üzerinden el ile de başlatabilmen için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Gerekli Derleme Araçlarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc-multilib \
          binutils \
          grub-common \
          grub-pc-bin \
          xorriso \
          mtools

    - name: build.sh Çalıştırılabilir Yap
      run: chmod +x build.sh

    - name: İşletim Sistemini Derle ve ISO Üret
      run: ./build.sh

    - name: Üretilen ISO Dosyasını Artifact Olarak Yükle
      uses: actions/upload-artifact@v4
      with:
        name: windos-iso-package
        path: windos.iso
        if-no-files-found: error
