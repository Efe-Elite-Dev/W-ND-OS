name: Sky-Core-OS Direct Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib

      - name: Build System (Direct Compilation)
        run: |
          # 1. Bootloader derle
          nasm -f elf32 boot.asm -o boot.o
          
          # 2. Kernel ve diğer kaynak dosyalarını derle
          # -m32: 32-bit mimari, -ffreestanding: standart kütüphanesiz derleme
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c kernel.c -o kernel.o
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c gui.c -o gui.o
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c mouse.c -o mouse.o
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c ai_subsystem.c -o ai_subsystem.o
          
          # 3. Linkleme işlemi (Objeleri birleştir)
          ld -m elf_i386 -T linker.ld -o kernel.bin boot.o kernel.o gui.o mouse.o ai_subsystem.o

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            kernel.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
