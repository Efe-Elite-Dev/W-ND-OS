name: WindOS Build CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Gerekli Derleme Araclari Kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib nasm xorriso grub-pc-bin grub-common os-prober mtools binutils

    - name: Assembly (boot.asm) Derle
      run: nasm -f elf32 boot.asm -o boot.o

    - name: Kernel (kernel.c) Derle
      run: gcc -m32 -ffreestanding -fno-builtin -fno-stack-protector -O2 -Wall -c kernel.c -o kernel.o

    - name: Link Kernel Binaries
      run: ld -m elf_i386 -T linker.ld boot.o kernel.o -o kernel.bin

    - name: ISO Yapisini Olustur ve Root'taki EXE'yi Gom
      run: |
        mkdir -p iso/boot/grub
        cp kernel.bin iso/boot/kernel.bin
        
        # YENİ: Ana dizindeki exe dosyasını bul, adını temizle ve ISO'ya kopyala!
        echo "Root dizindeki EXE araniyor..."
        for f in *.exe; do
            if [ -f "$f" ]; then
                echo "$f bulundu, ISO'ya ChromeSetup.exe olarak kopyalaniyor!"
                cp "$f" iso/ChromeSetup.exe
                break
            fi
        done
        
        echo 'set default=0' > iso/boot/grub/grub.cfg
        echo 'set timeout=0' >> iso/boot/grub/grub.cfg
        echo 'menuentry "WindOS V9.1" {' >> iso/boot/grub/grub.cfg
        echo '  multiboot /boot/kernel.bin' >> iso/boot/grub/grub.cfg
        echo '  boot' >> iso/boot/grub/grub.cfg
        echo '}' >> iso/boot/grub/grub.cfg

    - name: WindOS ISO Uret
      run: grub-mkrescue -o windos.iso iso

    - name: Uretilen ISO Dosyasini Yukle
      uses: actions/upload-artifact@v4
      with:
        name: WindOS-ISO-Dosyasi
        path: "*.iso"
        if-no-files-found: error
