name: Build WindOS ISO

on:
  push:
    branches: [ "main" ] # Sadece main branch pushlarında tetiklenmesi istersen (isteğe bağlı)
  pull_request:

# Release oluşturabilmek için gerekli yazma izni
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-multilib \
            nasm \
            xorriso \
            grub-pc-bin \
            grub-common \
            mtools

      - name: Build boot.asm
        run: |
          nasm -f elf32 boot.asm -o boot.o

      - name: Build kernel.c
        run: |
          gcc -m32 \
              -ffreestanding \
              -fno-pie \
              -fno-stack-protector \
              -nostdlib \
              -c kernel.c -o kernel.o

      - name: Link kernel
        run: |
          ld -m elf_i386 \
             -T linker.ld \
             -o windos.elf \
             boot.o kernel.o

      - name: Create ISO folders
        run: |
          mkdir -p iso/boot/grub

      - name: Copy kernel
        run: |
          cp windos.elf iso/boot/windos.elf

      - name: Create grub.cfg
        run: |
          cat << 'EOF' > iso/boot/grub/grub.cfg
          set timeout=0
          set default=0

          menuentry "Wind OS" {
              multiboot /boot/windos.elf
              boot
          }
          EOF

      - name: Build ISO
        run: |
          grub-mkrescue -o WindOS.iso iso

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindOS-ISO
          path: WindOS.iso

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: "WindOS Latest Build"
          body: "Automated build of WindOS from main branch."
          files: WindOS.iso
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
