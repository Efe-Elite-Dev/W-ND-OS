name: Sky-Core-OS-DIREKT-ISO

on: [push]

jobs:
  build_iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Compilers and ISO Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib grub-pc-bin xorriso mtools

      - name: Clean and Compile Kernel
        run: |
          rm -f *.o kernel.bin
          nasm -f elf32 boot.asm -o boot.o
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c *.c
          ld -m elf_i386 -T linker.ld -o kernel.bin *.o

      - name: Prepare GRUB Layout and Generate ISO
        run: |
          mkdir -p iso_root/boot/grub
          cp kernel.bin iso_root/boot/kernel.bin
          cat << 'EOF' > iso_root/boot/grub/grub.cfg
          set timeout=3
          set default=0
          menuentry "Sky-Core OS v1.5" {
              multiboot /boot/kernel.bin
              boot
          }
          EOF
          grub-mkrescue -o skycore.iso iso_root

      # Karışıklık olmasın diye ismi tamamen değiştirdik ve .bin dosyasını sildik!
      - name: Upload Only ISO
        uses: actions/upload-artifact@v4
        with:
          name: TIKLA-VE-DIREKT-ISO-INDIR
          path: skycore.iso
