name: 🚀 WIND OS MEGA BUILD & BOOT TEST ENGINE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_and_test:
    runs-of: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 20 deprecation uyarısını ezer

    steps:
    - name: 📥 Kaynak Kodları Çekiliyor
      uses: actions/checkout@v4

    - name: 🛠️ Gerekli Derleme ve Paketleme Araçları Kuruluyor
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib build-essential xorriso grub-pc-bin qemu-system-x86 xvfb Imagemagick

    - name: 🔐 Derleme Betiği Yetkilendiriliyor
      run: chmod +x build.sh

    - name: 🏗️ Çekirdek ve Tüm Alt Sistemler Derleniyor (Build)
      run: ./build.sh

    - name: 🖥️ QEMU Sanal Ekran Testi ve Siyah Ekran Analizi
      run: |
        echo "[+] Sanal ekran (Xvfb) arka planda başlatılıyor..."
        Xvfb :99 -screen 0 1024x768x24 &
        export DISPLAY=:99
        sleep 2
        
        echo "[+] Sky Core OS, QEMU üzerinde boot ediliyor (Süre: 5 saniye)..."
        qemu-system-x86_64 -cdrom os_image.iso -m 512M -vga std &
        QEMU_PID=$!
        sleep 5
        
        echo "[+] Ekranın canlı görüntüsü yakalanıyor (Screenshot)..."
        import -window root screenshot.png
        
        echo "[+] QEMU güvenli şekilde kapatılıyor..."
        kill -15 $QEMU_PID
        
        echo "[🔍] Siyah Ekran Analiz Motoru Çalışıyor..."
        BRIGHTNESS=$(convert screenshot.png -colorspace gray -format "%[fx:mean]" info:)
        echo "[+] Ekran Parlaklık Oranı: $BRIGHTNESS"
        
        # Eğer parlaklık 0 ise yani simsiyahsa hata ver ve durdur
        if [ $(echo "$BRIGHTNESS == 0.0" | bc -l) -eq 1 ]; then
          echo "======================================================================"
          echo "❌ HATA: Ekran simsiyah! Grafik motoru pikselleri basamadı."
          echo "======================================================================"
          exit 1
        else
          echo "======================================================================"
          echo "✅ BAŞARILI: Ekran simsiyah değil! Grafik motoru pikselleri bastı."
          echo "======================================================================"
        fi

    - name: 📦 Çıktılar Paketlemesi (Artifact Upload)
      uses: actions/upload-artifact@v4
      with:
        name: SkyCoreOS-Boot-Result
        path: |
          os_image.iso
          screenshot.png
        retention-days: 5
