name: Sky-Core-OS Auto-Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib

      - name: Compile Bootloader
        run: nasm -f elf32 boot.asm -o boot.o

      - name: Compile Kernel Sources
        run: |
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c kernel.c -o kernel.o
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c gui.c -o gui.o
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c mouse.c -o mouse.o
          gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c ai_subsystem.c -o ai_subsystem.o

      - name: Link Kernel
        run: ld -m elf_i386 -T linker.ld -o kernel.bin boot.o kernel.o gui.o mouse.o ai_subsystem.o

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: kernel.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
