name: Sky Core OS Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Derleme Araçlarını Kur (GCC, NASM & BIOS Paketleri)
      run: |
        sudo apt-get update
        # i386-pc kütüphanesini zorunlu kılmak için grub-pc-bin paketini de ekliyoruz
        sudo apt-get install -y gcc-multilib g++-multilib nasm make lld binutils grub-common grub-pc-bin xorriso mtools

    - name: Çalıştırılabilir İzinleri Ver
      run: chmod +x ./build.sh

    - name: Çekirdeği Derle (Saf Terminal Modu)
      run: ./build.sh

    - name: GRUB Temizliği ve 1MB Hedefli ISO Oluşturma
      run: |
        # ISO klasör yapısını hazırla
        mkdir -p iso_root/boot/grub
        
        # Çekirdek .bin dosyasını kontrol et ve taşı
        if [ -f bin/kernel.bin ]; then
          cp bin/kernel.bin iso_root/boot/kernel.bin
        elif [ -f kernel.bin ]; then
          cp kernel.bin iso_root/boot/kernel.bin
        else
          echo "HATA: kernel.bin bulunamadı!" && exit 1
        fi
        
        # En minimal GRUB yapılandırması
        cat << 'EOF' > iso_root/boot/grub/grub.cfg
        set timeout=0
        set default=0
        menuentry "Sky Core OS" {
            multiboot /boot/kernel.bin
            boot
        }
        EOF
        
        # HATA DÜZELTİLDİ VE BOYUT KIRPILDI: 
        # Mimariyi i386-pc (standart x86 BIOS) olarak kilitliyoruz.
        # Sadece sistemi ayağa kaldıracak en kritik 3 modülü (multiboot, normal, ext2) bırakıyoruz.
        # Geri kalan yüzlerce modül atıldığı için ISO boyutu radikal şekilde düşecek.
        grub-mkrescue -d /usr/lib/grub/i386-pc --modules="multiboot normal ext2" -o skycore.iso iso_root
        
        # Nihai boyutu terminale yazdır
        echo "=== NİHAİ SIKIŞTIRILMIŞ ISO BOYUTU ==="
        du -sh skycore.iso

    - name: Derleme Çıktılarını Arşivle (Artifact)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: skycore-ultra-minimal-iso
        path: |
          skycore.iso
        if-no-files-found: error
